<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación de Autenticidad — Cantón Merchandising</title>
<style>
  :root { --red:#e30613; --ink:#1a1a1a; --muted:#5a5a5a; --green:#1b9e3e; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         margin: 0; background: #fff; color: var(--ink); min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 420px; width: 100%; text-align: center; }
  .badge { width: 96px; height: 96px; border-radius: 50%; background: var(--green);
           display: flex; align-items: center; justify-content: center; margin: 0 auto 22px;
           box-shadow: 0 8px 24px rgba(27,158,62,.3); }
  .badge svg { width: 52px; height: 52px; }
  h1 { font-size: 1.5rem; margin: 0 0 6px; }
  .sub { color: var(--muted); margin: 0 0 26px; }
  .row { display: flex; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid #eee;
         font-size: .95rem; text-align: left; }
  .row span:first-child { color: var(--muted); }
  .row span:last-child { font-weight: 600; }
  .brand { margin-top: 30px; color: var(--red); font-weight: 700; letter-spacing: .5px; }
  .note { margin-top: 18px; font-size: .8rem; color: #9a9a9a; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h1>Producto Auténtico</h1>
    <p class="sub">Este artículo ha sido verificado como original.</p>

    <div class="row"><span>Estado</span><span style="color:var(--green)">✓ Verificado</span></div>
    <div class="row"><span>Producto</span><span>Jersey Oficial Cantón</span></div>
    <div class="row"><span>ID de verificación</span><span>CMX-DEMO-0001</span></div>
    <div class="row"><span>Marca</span><span>Cantón Merchandising™</span></div>

    <div class="brand">CANTÓN MERCHANDISING™</div>
    <p class="note">Página de demostración de verificación · Smart reader</p>
  </div>
</body>
</html>
